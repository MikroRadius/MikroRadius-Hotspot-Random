<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Error | MikroRadius</title>

    <style>
        :root {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --border: #334155;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --brand: #3b82f6;
            --brand-hover: #2563eb;
            --danger: #ef4444;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 420px;
            padding: 50px 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background-color: rgba(239,68,68,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .icon-box svg {
            width: 40px;
            height: 40px;
            fill: var(--danger);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }

        .error-msg {
            background-color: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5;
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
            width: 100%;
            text-align: left;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: var(--brand);
            color: white;
            padding: 12px 30px;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover { background-color: var(--brand-hover); }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-sub);
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
        </div>

        <h1>Hotspot Error</h1>

        <div class="error-msg">$(error)</div>

        <a href="$(link-login)" class="btn">Back to Login</a>

        <div class="footer">Powered by MikroRadius.com</div>
    </div>
</body>
</html>
