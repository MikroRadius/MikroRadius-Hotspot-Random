<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Advertisement | MikroRadius</title>

    <style>
        :root {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --border: #334155;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --brand: #3b82f6;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 420px;
            padding: 50px 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background-color: rgba(59,130,246,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .icon-box svg {
            width: 40px;
            height: 40px;
            fill: var(--brand);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }

        p {
            color: var(--text-sub);
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: var(--brand);
            color: white;
            padding: 12px 30px;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #2563eb; }

        .spinner {
            margin-top: 25px;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-left-color: var(--text-sub);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-sub);
            opacity: 0.6;
        }
    </style>

    <script>
        var popup = '';

        function openOrig() {
            if (window.focus) popup.focus();
            location.href = unescape('$(link-orig-esc)');
        }

        function openAd() {
            location.href = unescape('$(link-redirect-esc)');
        }

        function openAdvert() {
            if (window.name != 'hotspot_advert') {
                popup = open('$(link-redirect)', 'hotspot_advert', '');
                setTimeout("openOrig()", 2000);
                return;
            }
            setTimeout("openAd()", 1000);
        }
    </script>
</head>

<body onLoad="openAdvert()">
    <div class="card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm10 0h2v2h-2zm-6-4h8v2h-8z"/>
            </svg>
        </div>

        <h1>Loading Advertisement</h1>
        <p>Please wait while we load the advertisement.<br>You will be redirected automatically.</p>

        <a href="$(link-redirect)" target="hotspot_advert" class="btn">Open Manually</a>

        <div class="spinner"></div>

        <div class="footer">Powered by MikroRadius.com</div>
    </div>
</body>
</html>
