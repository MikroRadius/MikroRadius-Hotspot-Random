<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Login | MikroRadius</title>
    
    <style>
        :root {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --border: #334155;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --brand: #3b82f6;
            --brand-hover: #2563eb;
            --danger: #ef4444;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .header { margin-bottom: 30px; }
        .header svg {
            width: 50px;
            height: 50px;
            fill: var(--brand);
            margin-bottom: 15px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
        }
        .header p {
            font-size: 14px;
            color: var(--text-sub);
        }

        .tabs {
            display: flex;
            background-color: var(--bg-page);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background-color: var(--bg-card);
            color: var(--text-main);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-box {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-box svg {
            position: absolute;
            left: 15px;
            width: 20px;
            height: 20px;
            fill: var(--text-sub);
            pointer-events: none;
        }
        .form-control {
            width: 100%;
            height: 50px;
            padding: 0 15px 0 45px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: white;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--brand);
        }

        .btn-primary {
            width: 100%;
            height: 50px;
            background-color: var(--brand);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-primary:hover { background-color: var(--brand-hover); }

        .btn-outline {
            width: 100%;
            height: 50px;
            background-color: transparent;
            color: var(--brand);
            border: 2px solid var(--brand);
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .btn-outline:hover { background-color: rgba(59,130,246,0.1); }
        .btn-outline svg {
            width: 20px;
            height: 20px;
            fill: var(--brand);
            margin-right: 8px;
        }

        .qr-section { display: none; }
        .qr-info {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .error-banner {
            background-color: rgba(239,68,68,0.1);
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid rgba(239,68,68,0.2);
            display: none;
            text-align: left;
        }

        .trial-banner {
            background-color: rgba(59,130,246,0.1);
            color: var(--brand);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid rgba(59,130,246,0.2);
            text-align: center;
        }
        .trial-banner a {
            color: var(--brand);
            font-weight: 600;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    $(if chap-id)
    <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
    </form>
    <script src="/md5.js"></script>
    <script>
        function doLogin() {
            var usr = document.login.username.value;
            var pwd = document.login.password.value;
            if(pwd == "") pwd = usr;
            document.sendin.username.value = usr;
            document.sendin.password.value = hexMD5('$(chap-id)' + pwd + '$(chap-challenge)');
            document.sendin.submit();
            return false;
        }
    </script>
    $(endif)

    <div class="login-card">

        <div class="header">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
            <h1>MikroRadius</h1>
            <p>Connect to Wi-Fi</p>
        </div>

        $(if trial == 'yes')
        <div class="trial-banner">
            Free trial available &mdash; <a href="$(link-login-only)?dst=$(link-orig-esc)&amp;username=T-$(mac-esc)">Click here to try</a>
        </div>
        $(endif)

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('voucher', event)">Voucher</button>
            <button class="tab-btn" onclick="switchTab('qr', event)">QR Scan</button>
        </div>

        <div class="error-banner" id="error-box">
            $(if error)<strong>Error:</strong> $(error)$(endif)
        </div>
        <script>
            var err = document.getElementById('error-box');
            if(err.innerText.trim().length > 0) err.style.display = 'block';
        </script>

        <form name="login" action="$(link-login-only)" method="post" $(if chap-id)onSubmit="return doLogin()"$(endif)>
            <input type="hidden" name="dst" value="$(link-orig)" />
            <input type="hidden" name="popup" value="true" />

            <div id="view-voucher">
                <div class="input-group">
                    <label>Voucher Code</label>
                    <div class="input-box">
                        <svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.62 12 11 8.76l1-1.36 1 1.36L15.38 12 17 10.83 14.92 8H20v6z"/></svg>
                        <input type="text" name="username" class="form-control" value="$(username)" placeholder="Voucher Code" required autocomplete="off">
                    </div>
                </div>
                <input type="hidden" name="password" />
                <button type="submit" class="btn-primary">Connect to Internet</button>
            </div>

            <div id="view-qr" class="qr-section">
                <p class="qr-info">Scan a QR voucher using your camera. We'll open the scanner in your browser.</p>
                <button type="button" class="btn-outline" onclick="openScanner()">
                    <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                    Open Scanner
                </button>
            </div>

        </form>

        <div class="footer">
            Powered by <strong>MikroRadius.com</strong>
        </div>
    </div>

    <script>
        function switchTab(tabName, e) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById('view-voucher').style.display = 'none';
            document.getElementById('view-qr').style.display = 'none';
            document.getElementById('view-' + tabName).style.display = 'block';
        }

        function openScanner() {
            var targetUrl = "https://qr.mikroradius.com/";
            var isAndroid = navigator.userAgent.toLowerCase().indexOf("android") > -1;
            if (isAndroid) {
                window.location.href = "intent://qr.mikroradius.com/#Intent;scheme=https;package=com.android.chrome;end";
            } else {
                window.open(targetUrl, '_system');
                window.location.href = targetUrl;
            }
        }
    </script>
</body>
</html>
