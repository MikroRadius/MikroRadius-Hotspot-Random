<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="refresh" content="3; url=$(link-redirect)">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Connected | MikroRadius</title>

    <style>
        :root {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --brand: #3b82f6;
            --success: #10b981;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 420px;
            padding: 50px 30px;
            border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background-color: rgba(16,185,129,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .icon-box svg {
            width: 40px;
            height: 40px;
            fill: var(--success);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }

        p {
            color: var(--text-sub);
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: var(--brand);
            color: white;
            padding: 12px 30px;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #2563eb; }

        .spinner {
            margin-top: 25px;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-left-color: var(--text-sub);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-sub);
            opacity: 0.6;
        }
    </style>

    <script>
        function startClock() {
            $(if popup == 'true')
            open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=290,height=200');
            $(endif)
            setTimeout(function() {
                location.href = '$(link-redirect)';
            }, 2000);
        }
    </script>
</head>

<body onLoad="startClock()">
    <div class="card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
        </div>

        <h1>Connected!</h1>
        <p>You have successfully logged in.<br>Redirecting you to the internet&hellip;</p>

        <a href="$(link-redirect)" class="btn">Continue Browsing</a>

        <div class="spinner"></div>

        <div class="footer">Powered by MikroRadius.com</div>
    </div>
</body>
</html>
